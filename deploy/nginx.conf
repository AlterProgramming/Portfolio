server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  location = /admin {
    auth_basic "Portfolio Admin";
    auth_basic_user_file /etc/nginx/.htpasswd-portfolio-admin;
    access_log /var/log/nginx/portfolio_admin_access.log;
    try_files /admin/index.html =404;
  }

  location ^~ /admin/ {
    auth_basic "Portfolio Admin";
    auth_basic_user_file /etc/nginx/.htpasswd-portfolio-admin;
    access_log /var/log/nginx/portfolio_admin_access.log;
    try_files $uri $uri/ /admin/index.html;
  }

  location / {
    try_files $uri $uri.html $uri/ /index.html;
  }
}
